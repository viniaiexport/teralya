services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teralya
      POSTGRES_USER: teralya
      POSTGRES_PASSWORD: teralya_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teralya -d teralya"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - teralya-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - teralya-redis:/data

volumes:
  teralya-postgres:
  teralya-redis:
