services:
  caddy:
    image: caddy:2.10-alpine
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?define ACME_EMAIL in .env.staging}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - teralya-staging-caddy-data:/data
      - teralya-staging-caddy-config:/config
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/viniaiexport/teralya-frontend}:${IMAGE_TAG:-staging}
    environment:
      TERALYA_API_URL: ${TERALYA_API_URL:-http://backend:3001}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://staging.teralya.eu}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/viniaiexport/teralya-backend}:${IMAGE_TAG:-staging}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3001/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teralya
      POSTGRES_USER: teralya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD in .env.staging}
    volumes:
      - teralya-staging-postgres:/var/lib/postgresql/data
      - ./docs/INF/teralya_schema_v1.5_APROBADO.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teralya -d teralya"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - teralya-staging-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  teralya-staging-caddy-data:
  teralya-staging-caddy-config:
  teralya-staging-postgres:
  teralya-staging-redis:
