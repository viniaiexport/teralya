name: teralya-production

services:
  caddy:
    image: caddy:2.10-alpine
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?define ACME_EMAIL}
      SITE_DOMAIN: ${SITE_DOMAIN:?define SITE_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?define API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
      - app
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ${FRONTEND_IMAGE:?define FRONTEND_IMAGE}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      TERALYA_API_URL: http://backend:3001
      NEXT_PUBLIC_SITE_URL: https://${SITE_DOMAIN:?define SITE_DOMAIN}
    expose:
      - "3000"
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 4s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  backend:
    image: ${BACKEND_IMAGE:?define BACKEND_IMAGE}
    env_file:
      - .env.production
    expose:
      - "3001"
    networks:
      - app
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3001/health/ready"]
      interval: 15s
      timeout: 4s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teralya
      POSTGRES_USER: teralya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/INF/teralya_schema_v1.5_APROBADO.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teralya -d teralya"]
      interval: 10s
      timeout: 4s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?define REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep -q PONG"]
      interval: 10s
      timeout: 4s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?define REDIS_PASSWORD}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  edge:
  app:
  data:
    internal: true

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
