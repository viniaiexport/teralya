name: Build and deploy staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: teralya-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build immutable images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            dockerfile: apps/frontend/Dockerfile
            image: ghcr.io/viniaiexport/teralya-frontend
          - component: backend
            dockerfile: apps/backend/Dockerfile
            image: ghcr.io/viniaiexport/teralya-backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TERALYA_API_URL=http://backend:3001
            NEXT_PUBLIC_SITE_URL=https://staging.teralya.eu
          tags: |
            ${{ matrix.image }}:staging
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  deploy:
    name: Deploy to Hetzner
    needs: build
    if: ${{ github.event_name != 'pull_request' && vars.STAGING_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/teralya_staging
          chmod 600 ~/.ssh/teralya_staging
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Upload deployment definition
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          ssh -i ~/.ssh/teralya_staging "$SSH_USER@$SSH_HOST" 'install -d -m 750 ~/teralya/infrastructure/staging ~/teralya/docs/INF'
          scp -i ~/.ssh/teralya_staging compose.staging.yaml "$SSH_USER@$SSH_HOST:~/teralya/compose.staging.yaml"
          scp -i ~/.ssh/teralya_staging infrastructure/staging/Caddyfile "$SSH_USER@$SSH_HOST:~/teralya/infrastructure/staging/Caddyfile"
          scp -i ~/.ssh/teralya_staging docs/INF/teralya_schema_v1.4_APROBADO.sql "$SSH_USER@$SSH_HOST:~/teralya/docs/INF/teralya_schema_v1.4_APROBADO.sql"
          scp -i ~/.ssh/teralya_staging infrastructure/staging/deploy-staging.sh "$SSH_USER@$SSH_HOST:~/teralya/deploy-staging.sh"
      - name: Install environment and deploy
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          printf '%s' "$STAGING_ENV_FILE" | ssh -i ~/.ssh/teralya_staging "$SSH_USER@$SSH_HOST" 'umask 077; cat > ~/teralya/.env.staging'
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/teralya_staging "$SSH_USER@$SSH_HOST" "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          ssh -i ~/.ssh/teralya_staging "$SSH_USER@$SSH_HOST" 'chmod 700 ~/teralya/deploy-staging.sh && ~/teralya/deploy-staging.sh'
