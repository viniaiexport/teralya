name: Diagnose final frontend E2E v2

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/final-payload/**"
      - ".github/final-fixes.patch"
      - ".github/workflows/frontend-e2e-diagnostic-v2.yml"

permissions:
  contents: write

jobs:
  diagnose-e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TERALYA_API_URL: http://localhost:4100
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
    steps:
      - name: Clone candidate quietly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply exact candidate and typing fix
        run: |
          set -Eeuo pipefail
          while IFS= read -r file; do tail -n +2 "$file"; done < <(find .github/final-payload -type f -name 'part-*' | sort -V) | tr -d '\n' | base64 --decode > /tmp/final.patch.xz
          xz -dc /tmp/final.patch.xz > /tmp/final.patch
          git apply /tmp/final.patch
          git apply .github/final-fixes.patch
      - name: Install dependencies and Chromium
        run: |
          npm ci --silent
          npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1
      - name: Run browser journeys and persist diagnosis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npm run frontend:e2e > /tmp/frontend-e2e.log 2>&1
          status=$?
          set -e
          {
            echo "status=$status"
            echo "head=$GITHUB_SHA"
            echo "---- tail ----"
            tail -n 320 /tmp/frontend-e2e.log
          } > .github/e2e-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/e2e-diagnostic.txt
          git commit -m "Registrar diagnóstico E2E final"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
          exit "$status"
