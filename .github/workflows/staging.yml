name: Staging images

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "apps/frontend/**"
      - "infrastructure/staging/**"
      - "package.json"
      - "package-lock.json"
      - ".dockerignore"
      - ".env.staging.example"
      - "compose.staging.yaml"
      - "database/migrations/**"
      - "docs/INF/teralya_schema_v1.5_APROBADO.sql"
      - ".github/workflows/staging.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "apps/frontend/**"
      - "infrastructure/staging/**"
      - "package.json"
      - "package-lock.json"
      - ".dockerignore"
      - ".env.staging.example"
      - "compose.staging.yaml"
      - "database/migrations/**"
      - "docs/INF/teralya_schema_v1.5_APROBADO.sql"
      - ".github/workflows/staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: teralya-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            dockerfile: apps/backend/Dockerfile
            repository: ghcr.io/viniaiexport/teralya-backend
          - name: frontend
            dockerfile: apps/frontend/Dockerfile
            repository: ghcr.io/viniaiexport/teralya-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TERALYA_API_URL=http://backend:3001
            NEXT_PUBLIC_SITE_URL=https://staging.teralya.eu
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
          tags: |
            ${{ matrix.image.repository }}:staging
            ${{ matrix.image.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
      - name: Validate staging manifest
        run: cp .env.staging.example .env.staging && docker compose --env-file .env.staging -f compose.staging.yaml config --quiet

  deploy:
    name: Verify automatic staging deployment
    needs: build
    if: ${{ github.event_name != 'pull_request' && vars.STAGING_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: staging
    steps:
      - name: Wait for the Hetzner reconciler
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 60); do
            page="$(curl --fail --silent --show-error --max-time 10 \
              "https://staging.teralya.eu/?deployment=${EXPECTED_SHA}&attempt=${attempt}" || true)"
            if grep -Fq "name=\"teralya-build\" content=\"${EXPECTED_SHA}\"" <<<"$page"; then
              curl --fail --silent --show-error --max-time 10 \
                https://staging.teralya.eu/health/ready | grep -Fq '"status":"ready"'
              exit 0
            fi
            sleep 10
          done
          echo "Staging did not publish ${EXPECTED_SHA} within ten minutes." >&2
          exit 1
