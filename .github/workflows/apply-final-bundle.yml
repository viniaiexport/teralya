name: Apply final web bundle

on:
  push:
    branches:
      - agent/web-final-review
    paths:
      - "tmp/apply-final/READY"

permissions:
  contents: write

concurrency:
  group: teralya-apply-final-web
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and verify reviewed patch
        run: |
          cat tmp/apply-final/patch-* > /tmp/teralya-web-final-reviewed.patch
          echo "8c7b066a464e1e07122b6afdef201650358f5b4f38dd03a2d5bba1d8cd050381  /tmp/teralya-web-final-reviewed.patch" | sha256sum --check --strict
      - name: Apply reviewed source and remove bootstrap files
        run: |
          git apply --index --whitespace=error-all /tmp/teralya-web-final-reviewed.patch
          rm -rf tmp/apply-final
          rm -f .github/workflows/apply-final-bundle.yml
      - name: Commit reviewed web closure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          changed="$(git diff --cached --name-only | wc -l)"
          test "$changed" -ge 71
          git commit -m "Cerrar web y preparar revisión visual"
          git push origin "HEAD:${GITHUB_REF_NAME}"
