name: Apply final web bundle

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "tmp/apply-final/READY"
      - "tmp/apply-final/patch-*"
      - ".github/workflows/apply-final-bundle.yml"

permissions:
  contents: write

concurrency:
  group: teralya-apply-final-web
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Reconstruct and validate reviewed patch
        run: |
          set -Eeuo pipefail
          cat tmp/apply-final/patch-* > /tmp/teralya-web-final-reviewed.patch
          test -s /tmp/teralya-web-final-reviewed.patch
          sha256sum /tmp/teralya-web-final-reviewed.patch
          git apply --check --whitespace=error-all /tmp/teralya-web-final-reviewed.patch
      - name: Apply reviewed source and remove bootstrap files
        run: |
          set -Eeuo pipefail
          git apply --index --whitespace=error-all /tmp/teralya-web-final-reviewed.patch
          rm -rf tmp/apply-final
          rm -f .github/workflows/apply-final-bundle.yml
      - name: Commit reviewed web closure
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          changed="$(git diff --cached --name-only | wc -l)"
          test "$changed" -ge 69
          git commit -m "Cerrar web y preparar revisión visual"
          git push origin "HEAD:${{ github.head_ref }}"
