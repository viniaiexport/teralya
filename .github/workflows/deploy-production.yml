name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit, tag or branch to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: teralya-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      frontend_image: ${{ steps.images.outputs.frontend }}
      backend_image: ${{ steps.images.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: images
        name: Define immutable image names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          sha="$(git rev-parse HEAD)"
          echo "frontend=ghcr.io/${owner}/teralya-frontend:${sha}" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${owner}/teralya-backend:${sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend }}
          build-args: |
            TERALYA_API_URL=http://backend:3001
            NEXT_PUBLIC_SITE_URL=https://${{ vars.PRODUCTION_SITE_DOMAIN }}
          cache-from: type=gha,scope=frontend-production
          cache-to: type=gha,mode=max,scope=frontend-production

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.backend }}
          cache-from: type=gha,scope=backend-production
          cache-to: type=gha,mode=max,scope=backend-production

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare SSH and release files
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.HETZNER_SSH_KNOWN_HOSTS }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          printf '%s\n' "$PRODUCTION_ENV_FILE" > /tmp/.env.production
          sed -i '/^FRONTEND_IMAGE=/d;/^BACKEND_IMAGE=/d' /tmp/.env.production
          printf '\nFRONTEND_IMAGE=%s\nBACKEND_IMAGE=%s\n' "$FRONTEND_IMAGE" "$BACKEND_IMAGE" >> /tmp/.env.production
          chmod 0600 /tmp/.env.production
          tar -czf /tmp/teralya-release.tgz deploy/production docs/INF/teralya_schema_v1.5_APROBADO.sql database/migrations/20260717_001_cierre_web.sql

      - name: Authenticate the server to GHCR
        shell: bash
        env:
          HOST: ${{ secrets.HETZNER_SSH_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "deployer@${HOST}" docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Upload and deploy
        shell: bash
        env:
          HOST: ${{ secrets.HETZNER_SSH_HOST }}
        run: |
          scp /tmp/teralya-release.tgz /tmp/.env.production "deployer@${HOST}:/tmp/"
          ssh "deployer@${HOST}" 'bash -s' <<'REMOTE'
            set -euo pipefail
            rm -rf /tmp/teralya-release
            mkdir -p /tmp/teralya-release
            tar -xzf /tmp/teralya-release.tgz -C /tmp/teralya-release
            sudo install -d -o deployer -g deployer -m 0750 /srv/teralya /srv/teralya/docs/INF /srv/teralya/database/migrations
            sudo cp -a /tmp/teralya-release/deploy/production/. /srv/teralya/
            sudo install -o deployer -g deployer -m 0644 /tmp/teralya-release/docs/INF/teralya_schema_v1.5_APROBADO.sql /srv/teralya/docs/INF/
            sudo install -o deployer -g deployer -m 0644 /tmp/teralya-release/database/migrations/20260717_001_cierre_web.sql /srv/teralya/database/migrations/
            sudo install -o deployer -g deployer -m 0600 /tmp/.env.production /srv/teralya/.env.production
            sudo chown -R deployer:deployer /srv/teralya
            chmod 0750 /srv/teralya/scripts/*.sh
            /srv/teralya/scripts/deploy.sh
            sudo /srv/teralya/scripts/install-systemd.sh
            rm -rf /tmp/teralya-release /tmp/teralya-release.tgz /tmp/.env.production
          REMOTE

      - name: Verify public readiness
        env:
          API_URL: https://${{ vars.PRODUCTION_API_DOMAIN }}/health/ready
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 "$API_URL"
