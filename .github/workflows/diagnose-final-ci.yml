name: Diagnose final CI failures

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/diagnose-final-ci.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      PORT: 3999
      DATABASE_URL: postgresql://teralya:teralya_ci@localhost:5432/teralya
      REDIS_URL: redis://localhost:6379
      PUBLIC_BASE_URL: http://localhost:3001
      OBJECT_STORAGE_REGION: eu-west-1
      OBJECT_STORAGE_BUCKET: teralya-ci
      OBJECT_STORAGE_ENDPOINT: http://localhost:9000
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OBJECT_STORAGE_ACCESS_KEY_ID: teralya-ci
      OBJECT_STORAGE_SECRET_ACCESS_KEY: teralya-ci-secret
      OBJECT_STORAGE_CDN_BASE_URL: https://cdn.teralya.test
      IMAGE_CONFIRMATION_HMAC_SECRET: ci-image-confirmation-secret-at-least-32-bytes
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_0000000000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_CHECKOUT_SUCCESS_URL: https://teralya.test/checkout/success
      STRIPE_CHECKOUT_CANCEL_URL: https://teralya.test/checkout/cancel
      STRIPE_CHECKOUT_TTL_SECONDS: 1800
      MINIMUM_PURCHASE_AGE: 18
      ALCOHOL_TERMS_VERSION: ci-test-v1
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 5
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
      PASSWORD_RECOVERY_TOKEN_TTL_SECONDS: 3600
      PASSWORD_RECOVERY_RATE_LIMIT_MAX_ATTEMPTS: 3
      PASSWORD_RECOVERY_RATE_LIMIT_WINDOW_SECONDS: 900
      PASSWORD_RECOVERY_URL: http://localhost:3000/restablecer-password
      PASSWORD_RECOVERY_FROM_EMAIL: no-reply@teralya.test
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: ci
      SMTP_PASSWORD: ci
      TERALYA_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teralya
          POSTGRES_USER: teralya
          POSTGRES_PASSWORD: teralya_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U teralya -d teralya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aplicar-cierre-real
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Prepare database
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f docs/INF/teralya_schema_v1.5_APROBADO.sql >/dev/null
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/migrations/20260717_001_cierre_web.sql >/dev/null
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          npm run backend:check > /tmp/backend.log 2>&1
          backend_status=$?
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
          install_status=$?
          npm run frontend:e2e > /tmp/e2e.log 2>&1
          e2e_status=$?
          set -e
          mkdir -p ci-diagnostics
          {
            echo "BACKEND_STATUS=$backend_status"
            echo "PLAYWRIGHT_INSTALL_STATUS=$install_status"
            echo "E2E_STATUS=$e2e_status"
            echo
            echo "===== BACKEND TAIL ====="
            tail -n 320 /tmp/backend.log
            echo
            echo "===== PLAYWRIGHT INSTALL TAIL ====="
            tail -n 80 /tmp/playwright-install.log
            echo
            echo "===== E2E TAIL ====="
            tail -n 360 /tmp/e2e.log
          } > ci-diagnostics/final-ci.txt
      - name: Publish diagnostics to the branch
        run: |
          git config user.name "Teralya CTO"
          git config user.email "viniaiexport@gmail.com"
          git add ci-diagnostics/final-ci.txt
          git commit -m "Registrar diagnóstico final de CI"
          git push origin HEAD:agent/aplicar-cierre-real
