name: Diagnose premium frontend

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend-design-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Capture frontend check
        shell: bash
        run: |
          set +e
          npm run frontend:check > /tmp/frontend-design-check.log 2>&1
          status=$?
          set -e
          mkdir -p ci-diagnostics
          {
            echo "STATUS=$status"
            echo "COMMIT=$GITHUB_SHA"
            echo "===== FRONTEND CHECK ====="
            tail -n 500 /tmp/frontend-design-check.log
          } > ci-diagnostics/premium-frontend-check.txt
          git config user.name "Teralya CTO"
          git config user.email "viniaiexport@gmail.com"
          git add ci-diagnostics/premium-frontend-check.txt
          git commit -m "Registrar diagnóstico del rediseño premium"
          git pull --rebase origin "${GITHUB_HEAD_REF}"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
          exit "$status"
