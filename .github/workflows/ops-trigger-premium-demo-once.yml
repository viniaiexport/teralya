name: Lanzar demo premium una vez

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ops-trigger-premium-demo-once.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Lanzar la demo temporal del Frontend premium
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main"}' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/public-demo-tunnel.yml/dispatches"
