name: Source snapshot (temporary)

on:
  pull_request:
    paths:
      - ".github/workflows/source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/teralya-source.tgz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: teralya-source-snapshot
          path: /tmp/teralya-source.tgz
          retention-days: 1
          if-no-files-found: error
