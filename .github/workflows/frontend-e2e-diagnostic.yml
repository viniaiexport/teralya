name: Diagnose final frontend E2E

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/final-payload/**"
      - ".github/final-fixes.patch"
      - ".github/workflows/frontend-e2e-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TERALYA_API_URL: http://localhost:4100
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
    steps:
      - name: Clone candidate quietly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply exact candidate and typing fix
        run: |
          set -Eeuo pipefail
          while IFS= read -r file; do tail -n +2 "$file"; done < <(find .github/final-payload -type f -name 'part-*' | sort -V) | tr -d '\n' | base64 --decode > /tmp/final.patch.xz
          xz -dc /tmp/final.patch.xz > /tmp/final.patch
          git apply /tmp/final.patch
          git apply .github/final-fixes.patch
      - name: Install dependencies and Chromium quietly
        run: |
          set +e
          npm ci --silent > /tmp/npm-ci.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then tail -n 180 /tmp/npm-ci.log; exit "$status"; fi
          set +e
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then tail -n 180 /tmp/playwright-install.log; exit "$status"; fi
      - name: Diagnose browser journeys
        run: |
          set +e
          npm run frontend:e2e > /tmp/frontend-e2e.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "FRONTEND_E2E_FAILED=$status"
            tail -n 260 /tmp/frontend-e2e.log
            exit "$status"
          fi
          echo "FRONTEND_E2E_OK"
          tail -n 80 /tmp/frontend-e2e.log
