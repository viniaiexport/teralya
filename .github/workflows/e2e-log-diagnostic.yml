name: Capture final E2E log

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/e2e-log-diagnostic.yml"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TERALYA_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run frontend:check > /tmp/frontend-check.log 2>&1
      - run: npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - id: e2e
        name: Capture browser run
        shell: bash
        run: |
          set +e
          npm run frontend:e2e > /tmp/frontend-e2e.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$status" > /tmp/frontend-e2e.status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teralya-final-e2e-log
          path: |
            /tmp/frontend-e2e.log
            /tmp/frontend-e2e.status
            apps/frontend/test-results
          if-no-files-found: warn
          retention-days: 2
      - name: Preserve failure state
        if: always()
        run: test "${{ steps.e2e.outputs.status }}" -eq 0
