name: Apply and validate final web v2

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/final-payload/**"
      - ".github/final-fixes.patch"
      - ".github/workflows/apply-and-validate-final-web-v2.yml"

permissions:
  contents: write

concurrency:
  group: teralya-final-web-v2-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  apply-validate-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_ENV: test
      PORT: 3999
      DATABASE_URL: postgresql://teralya:teralya_ci@localhost:5432/teralya
      REDIS_URL: redis://localhost:6379
      PUBLIC_BASE_URL: http://localhost:3001
      OBJECT_STORAGE_REGION: eu-west-1
      OBJECT_STORAGE_BUCKET: teralya-ci
      OBJECT_STORAGE_ENDPOINT: http://localhost:9000
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OBJECT_STORAGE_ACCESS_KEY_ID: teralya-ci
      OBJECT_STORAGE_SECRET_ACCESS_KEY: teralya-ci-secret
      OBJECT_STORAGE_CDN_BASE_URL: https://cdn.teralya.test
      IMAGE_CONFIRMATION_HMAC_SECRET: ci-image-confirmation-secret-at-least-32-bytes
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_0000000000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_CHECKOUT_SUCCESS_URL: https://teralya.test/checkout/success
      STRIPE_CHECKOUT_CANCEL_URL: https://teralya.test/checkout/cancel
      STRIPE_CHECKOUT_TTL_SECONDS: 1800
      MINIMUM_PURCHASE_AGE: 18
      ALCOHOL_TERMS_VERSION: ci-test-v1
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 5
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
      PASSWORD_RECOVERY_TOKEN_TTL_SECONDS: 3600
      PASSWORD_RECOVERY_RATE_LIMIT_MAX_ATTEMPTS: 3
      PASSWORD_RECOVERY_RATE_LIMIT_WINDOW_SECONDS: 900
      PASSWORD_RECOVERY_URL: http://localhost:3000/restablecer-password
      PASSWORD_RECOVERY_FROM_EMAIL: no-reply@teralya.test
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: ci
      SMTP_PASSWORD: ci
      TERALYA_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teralya
          POSTGRES_USER: teralya
          POSTGRES_PASSWORD: teralya_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teralya -d teralya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout candidate branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          git clone --quiet --branch "$GITHUB_HEAD_REF" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      - name: Reconstruct and verify exact candidate
        run: |
          set -Eeuo pipefail
          count="$(find .github/final-payload -type f -name 'part-*' | wc -l)"
          test "$count" -eq 27
          while IFS= read -r file; do
            tail -n +2 "$file"
          done < <(find .github/final-payload -type f -name 'part-*' | sort -V) \
            | tr -d '\n' \
            | base64 --decode \
            > /tmp/teralya-main-final.patch.xz
          echo "5b8e49000d4a6cd952c179ee61e41fcd88d6b6a98992f531e2eb7ea50a3919cc  /tmp/teralya-main-final.patch.xz" | sha256sum --check --strict
          xz -dc /tmp/teralya-main-final.patch.xz > /tmp/teralya-main-final.patch
          echo "a7e95673ce661e4b2329f317af0bd19a300c301afa8b10cf6a31ad663fbb9cd2  /tmp/teralya-main-final.patch" | sha256sum --check --strict
          git apply --check --verbose --whitespace=error-all /tmp/teralya-main-final.patch
          git apply --index --whitespace=error-all /tmp/teralya-main-final.patch
          git apply --check --verbose --whitespace=error-all .github/final-fixes.patch
          git apply --index --whitespace=error-all .github/final-fixes.patch
          rm -rf .github/final-payload
          rm -f .github/final-fixes.patch
          rm -f .github/e2e-diagnostic.txt
          rm -f .github/workflows/backend-diagnostic-final.yml
          rm -f .github/workflows/frontend-e2e-diagnostic.yml
          rm -f .github/workflows/frontend-e2e-diagnostic-v2.yml
          rm -f .github/workflows/apply-and-validate-final-web.yml
          rm -f .github/workflows/apply-and-validate-final-web-v2.yml

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --disable-pip-version-check pyyaml

      - name: Apply final PostgreSQL schema and migration
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f docs/INF/teralya_schema_v1.5_APROBADO.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/migrations/20260717_001_cierre_web.sql

      - name: Validate backend
        run: npm run backend:check

      - name: Validate generated OpenAPI contract
        run: |
          python scripts/generate_openapi_contract.py
          git diff --exit-code -- docs/INF/openapi/teralya-openapi-v1.1.yaml
          python scripts/validate_openapi_contract.py docs/INF/openapi/teralya-openapi-v1.1.yaml
          npx --yes @redocly/cli lint docs/INF/openapi/teralya-openapi-v1.1.yaml

      - name: Validate frontend
        run: |
          npm run frontend:audit
          npm run frontend:check

      - name: Validate browser journeys with official E2E environment
        run: |
          unset NODE_ENV
          export TERALYA_API_URL=http://localhost:4100
          export NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3100
          npx playwright install --with-deps chromium
          npm run frontend:e2e

      - name: Publish visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teralya-final-visual-previews
          path: apps/frontend/visual-previews
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and publish validated web
        if: success()
        run: |
          set -Eeuo pipefail
          git config user.name "Teralya CTO"
          git config user.email "viniaiexport@gmail.com"
          git add --all
          git diff --cached --check
          changed="$(git diff --cached --name-only | wc -l)"
          test "$changed" -ge 69
          git commit -m "Finalizar web del MVP"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
