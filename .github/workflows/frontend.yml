name: Frontend

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TERALYA_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run frontend:audit
      - run: npm run frontend:check
      - run: npx playwright install --with-deps chromium
      - run: npm run frontend:e2e
      - name: Publish visual previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teralya-visual-previews
          path: apps/frontend/visual-previews
          if-no-files-found: warn
          retention-days: 14
