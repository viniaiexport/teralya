name: Frontend

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TERALYA_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run frontend:audit
      - run: npm run frontend:check
      - run: npx playwright install --with-deps chromium
      - run: npm run frontend:e2e
      - name: Publish visual previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teralya-visual-previews
          path: apps/frontend/visual-previews
          if-no-files-found: warn
          retention-days: 14
      - name: Publish visual preview branch
        if: success() && github.event_name == 'pull_request'
        env:
          PREVIEW_BRANCH: visual/teralya-previews
        run: |
          mkdir -p /tmp/teralya-visual-previews
          cp apps/frontend/visual-previews/*.png /tmp/teralya-visual-previews/
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch --orphan visual-preview-publish
          git rm -rf .
          mkdir visual-previews
          cp /tmp/teralya-visual-previews/*.png visual-previews/
          git add visual-previews
          git commit -m "chore: publish Teralya visual previews"
          git push --force origin HEAD:${PREVIEW_BRANCH}
