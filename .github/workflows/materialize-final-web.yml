name: Materialize final Teralya web

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - ".github/materialize-final-web.trigger"
      - ".github/workflows/materialize-final-web.yml"

permissions:
  contents: write

concurrency:
  group: teralya-materialize-final-web
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aplicar-cierre-real
          fetch-depth: 0

      - name: Reconstruct and apply the exact reviewed candidate
        shell: bash
        run: |
          set -Eeuo pipefail
          count="$(find .github/final-payload -type f -name 'part-*' | wc -l)"
          test "$count" -eq 27
          while IFS= read -r file; do
            tail -n +2 "$file"
          done < <(find .github/final-payload -type f -name 'part-*' | sort -V) \
            | tr -d '\n' \
            | base64 --decode \
            > /tmp/teralya-final.patch.xz
          echo "5b8e49000d4a6cd952c179ee61e41fcd88d6b6a98992f531e2eb7ea50a3919cc  /tmp/teralya-final.patch.xz" | sha256sum --check --strict
          xz -dc /tmp/teralya-final.patch.xz > /tmp/teralya-final.patch
          echo "a7e95673ce661e4b2329f317af0bd19a300c301afa8b10cf6a31ad663fbb9cd2  /tmp/teralya-final.patch" | sha256sum --check --strict
          git apply --check --whitespace=error-all /tmp/teralya-final.patch
          git apply --whitespace=error-all /tmp/teralya-final.patch

          # El GITHUB_TOKEN no puede modificar workflows. Se conserva cualquier
          # workflow que el parche pretendiera borrar y se limpiará después con
          # el conector de GitHub.
          git checkout HEAD -- .github/workflows/source-snapshot.yml 2>/dev/null || true

      - name: Remove temporary non-workflow payloads
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .github/final-payload
          rm -f .github/materialize-final-web.trigger
          rm -rf .github/finish-b64 .github/finish-patch tmp/apply-final
          rm -f .github/apply-trigger .github/fallback-trigger .github/finalize-trigger

      - name: Commit the real source tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "Teralya CTO"
          git config user.email "viniaiexport@gmail.com"
          git add --all
          git diff --cached --check
          if git diff --cached --name-only | grep -q '^.github/workflows/'; then
            echo "El commit del bot no puede modificar workflows" >&2
            git diff --cached --name-only | grep '^.github/workflows/' >&2
            exit 1
          fi
          changed="$(git diff --cached --name-only | wc -l)"
          test "$changed" -ge 69
          git commit -m "Integrar realmente el cierre final de la web"
          git push origin HEAD:agent/aplicar-cierre-real
