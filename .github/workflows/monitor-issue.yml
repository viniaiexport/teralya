name: Monitor canal CTO-Claude (Issue #1)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  check-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Revisar comentarios pendientes en el Issue #1
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = 1;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            // Bots/actores considerados "no-Claude" (Claude comenta como el usuario del PAT, sin marca propia)
            const isFromChatGPTOrCEO = (c) =>
              c.performed_via_github_app || c.user.type !== 'Bot';

            const lastEvent = comments.length
              ? comments[comments.length - 1]
              : issue;

            const lastIsFromClaude =
              lastEvent.body && lastEvent.body.includes('Entrega Claude');

            const hasLabel = issue.labels.some((l) => l.name === 'needs-claude');

            if (!lastIsFromClaude && !hasLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: ['needs-claude'],
              });
              console.log('Etiqueta needs-claude añadida: hay actividad sin respuesta de Claude.');
            } else {
              console.log('Sin acción: la última entrada ya es de Claude o ya estaba etiquetado.');
            }
