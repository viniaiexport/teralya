name: Publicar vista pública de Teralya

on:
  push:
    branches: [main]
    paths:
      - "public-preview/**"
      - ".github/workflows/public-preview-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: teralya-public-preview
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Empaquetar la vista pública
        id: package
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-preview

      - name: Publicar en GitHub Pages
        id: deployment
        if: steps.package.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Registrar la URL pública y el resultado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          PACKAGE_OUTCOME: ${{ steps.package.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          fallback_url="https://raw.githack.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/public-preview/index.html"
          body="$(cat <<EOF
          ## Vista pública de Teralya

          - Configuración de GitHub Pages: **${CONFIGURE_OUTCOME:-no ejecutada}**
          - Empaquetado: **${PACKAGE_OUTCOME:-no ejecutado}**
          - Despliegue Pages: **${DEPLOY_OUTCOME:-no ejecutado}**
          - URL GitHub Pages: ${PAGE_URL:-no disponible}
          - URL pública alternativa: ${fallback_url}
          - Commit: \`${GITHUB_SHA}\`

          La vista es estática, no transaccional y no sustituye OPS-01 ni la publicación de producción en teralya.eu.
          EOF
          )"
          payload="$(jq -nc --arg body "$body" '{body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/70/comments" >/dev/null

      - name: Exigir publicación correcta en GitHub Pages
        if: steps.deployment.outcome != 'success'
        shell: bash
        run: |
          echo "GitHub Pages no quedó habilitado. La vista alternativa permanece pública mediante el commit versionado." >&2
          exit 1
