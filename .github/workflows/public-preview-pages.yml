name: Publicar vista pública de Teralya

on:
  push:
    branches: [main]
    paths:
      - "public-preview/**"
      - ".github/workflows/public-preview-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: teralya-public-preview
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Empaquetar la vista pública
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-preview
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
