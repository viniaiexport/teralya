name: Publicar teralya.eu una vez

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ops-publicar-teralya-once.yml"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: teralya-publication-once
  cancel-in-progress: false

jobs:
  publish:
    if: "${{ startsWith(github.event.head_commit.message, 'OPS: publicar teralya.eu') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      SITE_DOMAIN: ${{ vars.PRODUCTION_SITE_DOMAIN }}
      API_DOMAIN: ${{ vars.PRODUCTION_API_DOMAIN }}
      HETZNER_SSH_HOST: ${{ secrets.HETZNER_SSH_HOST }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.HETZNER_SSH_KNOWN_HOSTS }}
      PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Validar configuración de publicación
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          failures=()

          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              failures+=("Falta ${name}")
            fi
          }

          require_value "vars.PRODUCTION_SITE_DOMAIN" "$SITE_DOMAIN"
          require_value "vars.PRODUCTION_API_DOMAIN" "$API_DOMAIN"
          require_value "secrets.HETZNER_SSH_HOST" "$HETZNER_SSH_HOST"
          require_value "secrets.HETZNER_SSH_PRIVATE_KEY" "$DEPLOY_SSH_PRIVATE_KEY"
          require_value "secrets.HETZNER_SSH_KNOWN_HOSTS" "$DEPLOY_SSH_KNOWN_HOSTS"
          require_value "secrets.PRODUCTION_ENV_FILE" "$PRODUCTION_ENV_FILE"

          [[ "$SITE_DOMAIN" == "teralya.eu" ]] || failures+=("PRODUCTION_SITE_DOMAIN debe ser teralya.eu")
          [[ "$API_DOMAIN" == "api.teralya.eu" ]] || failures+=("PRODUCTION_API_DOMAIN debe ser api.teralya.eu")

          if [[ -n "$PRODUCTION_ENV_FILE" ]]; then
            if grep -Eq 'replace-with|REPLACE_WITH' <<<"$PRODUCTION_ENV_FILE"; then
              failures+=("PRODUCTION_ENV_FILE contiene marcadores replace-with")
            fi
            grep -qx 'SITE_DOMAIN=teralya.eu' <<<"$PRODUCTION_ENV_FILE" || failures+=("PRODUCTION_ENV_FILE no fija SITE_DOMAIN=teralya.eu")
            grep -qx 'API_DOMAIN=api.teralya.eu' <<<"$PRODUCTION_ENV_FILE" || failures+=("PRODUCTION_ENV_FILE no fija API_DOMAIN=api.teralya.eu")
            grep -qx 'MINIMUM_PURCHASE_AGE=18' <<<"$PRODUCTION_ENV_FILE" || failures+=("PRODUCTION_ENV_FILE no fija MINIMUM_PURCHASE_AGE=18")
            grep -qx 'ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0' <<<"$PRODUCTION_ENV_FILE" || failures+=("PRODUCTION_ENV_FILE no fija ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0")
          fi

          if (( ${#failures[@]} > 0 )); then
            reason="$(printf '%s; ' "${failures[@]}")"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=${reason%; }" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${failures[@]}" >&2
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "reason=Configuración mínima presente" >> "$GITHUB_OUTPUT"

      - name: Preparar DNS y modo TLS de Cloudflare
        id: dns
        shell: bash
        run: |
          set -euo pipefail

          site_resolves=false
          api_resolves=false
          getent ahostsv4 "$SITE_DOMAIN" >/dev/null 2>&1 && site_resolves=true
          getent ahostsv4 "$API_DOMAIN" >/dev/null 2>&1 && api_resolves=true

          if [[ "$site_resolves" != "true" || "$api_resolves" != "true" ]]; then
            if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
              echo "Los dominios no resuelven y faltan CLOUDFLARE_ZONE_ID/CLOUDFLARE_API_TOKEN." >&2
              exit 1
            fi

            origin_ipv4="$HETZNER_SSH_HOST"
            if [[ ! "$origin_ipv4" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              origin_ipv4="$(getent ahostsv4 "$HETZNER_SSH_HOST" | awk 'NR==1 {print $1}')"
            fi
            if [[ -z "$origin_ipv4" ]]; then
              echo "No se pudo resolver la IPv4 del origen Hetzner." >&2
              exit 1
            fi

            export CLOUDFLARE_ZONE_ID CLOUDFLARE_API_TOKEN
            export TERALYA_DOMAIN="$SITE_DOMAIN"
            bash infrastructure/cloudflare/configure-dns.sh "$origin_ipv4"
          fi

          if [[ -n "$CLOUDFLARE_ZONE_ID" && -n "$CLOUDFLARE_API_TOKEN" ]]; then
            curl --fail --silent --show-error \
              --request PATCH \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"value":"full"}' \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/settings/ssl" \
              | jq -e '.success == true' >/dev/null
          fi

          echo "prepared=true" >> "$GITHUB_OUTPUT"

      - name: Lanzar el pipeline de producción aprobado
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          workflow_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-production.yml"
          runs_api="${workflow_api}/runs?event=workflow_dispatch&per_page=30"
          before_id="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "$runs_api" | jq -r '.workflow_runs[0].id // 0')"

          payload="$(jq -nc --arg workflow_ref main --arg deploy_ref "$GITHUB_SHA" \
            '{ref:$workflow_ref,inputs:{ref:$deploy_ref}}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${workflow_api}/dispatches"

          run_id=""
          for _ in $(seq 1 60); do
            run_id="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$runs_api" \
              | jq -r --arg sha "$GITHUB_SHA" --argjson before "$before_id" \
                '[.workflow_runs[] | select(.event == "workflow_dispatch" and .head_sha == $sha and .id != $before)] | sort_by(.created_at) | last | .id // empty')"
            [[ -n "$run_id" ]] && break
            sleep 5
          done

          if [[ -z "$run_id" ]]; then
            echo "GitHub no devolvió la ejecución de producción recién lanzada." >&2
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"

      - name: Esperar la finalización del despliegue
        id: wait
        shell: bash
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          run_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"

          for _ in $(seq 1 240); do
            run_json="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$run_api")"
            status="$(jq -r '.status' <<<"$run_json")"
            conclusion="$(jq -r '.conclusion // empty' <<<"$run_json")"
            echo "Despliegue: status=${status} conclusion=${conclusion:-pendiente}"

            if [[ "$status" == "completed" ]]; then
              echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
              if [[ "$conclusion" != "success" ]]; then
                curl --fail --silent --show-error \
                  --header "Authorization: Bearer ${GH_TOKEN}" \
                  --header "Accept: application/vnd.github+json" \
                  "${run_api}/jobs?per_page=100" \
                  | jq -r '.jobs[] | "\(.name): \(.conclusion // .status)"' >&2 || true
                exit 1
              fi
              exit 0
            fi
            sleep 10
          done

          echo "El despliegue no terminó dentro de la ventana operativa." >&2
          exit 1

      - name: Verificar la web y endurecer TLS
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://${API_DOMAIN}/health/ready"
          site_url="https://${SITE_DOMAIN}/"

          curl --fail --show-error --silent --retry 30 --retry-delay 10 --retry-all-errors "$api_url" >/tmp/api-ready.json
          curl --fail --show-error --silent --location --retry 30 --retry-delay 10 --retry-all-errors "$site_url" >/tmp/site.html
          grep -qi 'Teralya' /tmp/site.html

          if [[ -n "$CLOUDFLARE_ZONE_ID" && -n "$CLOUDFLARE_API_TOKEN" ]]; then
            curl --fail --silent --show-error \
              --request PATCH \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"value":"strict"}' \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/settings/ssl" \
              | jq -e '.success == true' >/dev/null
          fi

          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"
          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"

      - name: Registrar resultado operativo
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          PREFLIGHT_REASON: ${{ steps.preflight.outputs.reason }}
          DEPLOY_RUN_URL: ${{ steps.dispatch.outputs.run_url }}
          DEPLOY_CONCLUSION: ${{ steps.wait.outputs.conclusion }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          title="OPS publicación teralya.eu: ${JOB_STATUS} (${short_sha})"
          body="$(cat <<EOF
          ## Resultado

          - Estado del orquestador: **${JOB_STATUS}**
          - Preflight: ${PREFLIGHT_REASON:-no disponible}
          - Despliegue: ${DEPLOY_CONCLUSION:-no iniciado o no finalizado}
          - Ejecución de producción: ${DEPLOY_RUN_URL:-no disponible}
          - Web objetivo: https://${SITE_DOMAIN:-teralya.eu}
          - API objetivo: https://${API_DOMAIN:-api.teralya.eu}/health/ready
          - Commit publicado: \`${GITHUB_SHA}\`

          Los valores secretos no se incluyen en este informe.
          EOF
          )"
          payload="$(jq -nc --arg title "$title" --arg body "$body" '{title:$title,body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" >/dev/null
