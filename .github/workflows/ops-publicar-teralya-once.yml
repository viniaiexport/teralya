name: Activar staging de Teralya una vez

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ops-publicar-teralya-once.yml"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: teralya-staging-activation-once
  cancel-in-progress: false

jobs:
  activate:
    if: "${{ startsWith(github.event.head_commit.message, 'OPS: activar staging') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment: staging
    env:
      STAGING_DEPLOY_ENABLED: ${{ vars.STAGING_DEPLOY_ENABLED }}
      STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Validar configuración de staging
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          failures=()

          require_value() {
            local name="$1"
            local value="$2"
            [[ -n "$value" ]] || failures+=("Falta ${name}")
          }

          require_value "secrets.STAGING_SSH_PRIVATE_KEY" "$STAGING_SSH_PRIVATE_KEY"
          require_value "secrets.STAGING_SSH_KNOWN_HOSTS" "$STAGING_SSH_KNOWN_HOSTS"
          require_value "secrets.STAGING_SSH_HOST" "$STAGING_SSH_HOST"
          require_value "secrets.STAGING_SSH_USER" "$STAGING_SSH_USER"
          require_value "secrets.STAGING_ENV_FILE" "$STAGING_ENV_FILE"
          [[ "$STAGING_DEPLOY_ENABLED" == "true" ]] || failures+=("vars.STAGING_DEPLOY_ENABLED debe ser true")

          if [[ -n "$STAGING_ENV_FILE" ]]; then
            if grep -Eq 'replace-with|REPLACE_WITH' <<<"$STAGING_ENV_FILE"; then
              failures+=("STAGING_ENV_FILE contiene marcadores replace-with")
            fi
            grep -qx 'ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0' <<<"$STAGING_ENV_FILE" || failures+=("STAGING_ENV_FILE no fija ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0")
          fi

          if (( ${#failures[@]} > 0 )); then
            reason="$(printf '%s; ' "${failures[@]}")"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=${reason%; }" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${failures[@]}" >&2
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "reason=Configuración de staging presente" >> "$GITHUB_OUTPUT"

      - name: Lanzar el workflow oficial de staging
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          workflow_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/staging.yml"
          runs_api="${workflow_api}/runs?event=workflow_dispatch&per_page=30"
          before_id="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "$runs_api" | jq -r '.workflow_runs[0].id // 0')"

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main"}' \
            "${workflow_api}/dispatches"

          run_id=""
          for _ in $(seq 1 60); do
            run_id="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$runs_api" \
              | jq -r --arg sha "$GITHUB_SHA" --argjson before "$before_id" \
                '[.workflow_runs[] | select(.event == "workflow_dispatch" and .head_sha == $sha and .id != $before)] | sort_by(.created_at) | last | .id // empty')"
            [[ -n "$run_id" ]] && break
            sleep 5
          done

          [[ -n "$run_id" ]] || { echo "No apareció la ejecución de staging." >&2; exit 1; }
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"

      - name: Esperar y comprobar el despliegue de staging
        id: wait
        shell: bash
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          run_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"

          for _ in $(seq 1 180); do
            run_json="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$run_api")"
            status="$(jq -r '.status' <<<"$run_json")"
            conclusion="$(jq -r '.conclusion // empty' <<<"$run_json")"
            echo "Staging: status=${status} conclusion=${conclusion:-pendiente}"

            if [[ "$status" == "completed" ]]; then
              jobs_json="$(curl --fail --silent --show-error \
                --header "Authorization: Bearer ${GH_TOKEN}" \
                --header "Accept: application/vnd.github+json" \
                "${run_api}/jobs?per_page=100")"
              deploy_conclusion="$(jq -r '[.jobs[] | select(.name == "Deploy to Hetzner")][0].conclusion // "missing"' <<<"$jobs_json")"
              echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
              echo "deploy_conclusion=$deploy_conclusion" >> "$GITHUB_OUTPUT"
              if [[ "$conclusion" != "success" || "$deploy_conclusion" != "success" ]]; then
                jq -r '.jobs[] | "\(.name): \(.conclusion // .status)"' <<<"$jobs_json" >&2
                exit 1
              fi
              exit 0
            fi
            sleep 10
          done

          echo "Staging no terminó dentro de la ventana operativa." >&2
          exit 1

      - name: Verificar staging público
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          site_url="https://staging.teralya.eu/"
          curl --fail --show-error --silent --location --retry 30 --retry-delay 10 --retry-all-errors "$site_url" >/tmp/staging.html
          grep -qi 'Teralya' /tmp/staging.html
          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"

      - name: Registrar resultado operativo
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          PREFLIGHT_REASON: ${{ steps.preflight.outputs.reason }}
          RUN_URL: ${{ steps.dispatch.outputs.run_url }}
          RUN_CONCLUSION: ${{ steps.wait.outputs.conclusion }}
          DEPLOY_CONCLUSION: ${{ steps.wait.outputs.deploy_conclusion }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          title="OPS activación staging: ${JOB_STATUS} (${short_sha})"
          body="$(cat <<EOF
          ## Resultado

          - Estado del orquestador: **${JOB_STATUS}**
          - Preflight: ${PREFLIGHT_REASON:-no disponible}
          - Workflow de staging: ${RUN_CONCLUSION:-no iniciado o no finalizado}
          - Job de despliegue: ${DEPLOY_CONCLUSION:-no iniciado}
          - Ejecución: ${RUN_URL:-no disponible}
          - URL objetivo: https://staging.teralya.eu/
          - Commit: \`${GITHUB_SHA}\`

          Los valores secretos no se incluyen en este informe.
          EOF
          )"
          payload="$(jq -nc --arg title "$title" --arg body "$body" '{title:$title,body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" >/dev/null
