name: Publicar demo temporal navegable de Teralya

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/public-demo-tunnel.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: teralya-public-demo-tunnel
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    env:
      TERALYA_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias y construir el Frontend aprobado
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            npm ci --include=dev
            npm run frontend:build
          } 2>&1 | tee /tmp/teralya-build.log

      - name: Levantar Frontend y API simulada sin datos reales
        id: local
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          NODE_ENV: production
        shell: bash
        run: |
          set -euo pipefail
          nohup node apps/frontend/test/e2e/mock-api.mjs >/tmp/teralya-mock-api.log 2>&1 &
          echo "mock_pid=$!" >> "$GITHUB_OUTPUT"
          nohup npm run start --workspace @teralya/frontend -- --hostname 127.0.0.1 >/tmp/teralya-frontend.log 2>&1 &
          echo "frontend_pid=$!" >> "$GITHUB_OUTPUT"

          for _ in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:3001/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000/ >/tmp/teralya-home.html; then
              grep -qi 'Teralya' /tmp/teralya-home.html
              echo "Frontend y mock API preparados."
              exit 0
            fi
            sleep 2
          done

          echo "La demo local no alcanzó estado saludable." >&2
          tail -n 120 /tmp/teralya-mock-api.log >&2 || true
          tail -n 160 /tmp/teralya-frontend.log >&2 || true
          exit 1

      - name: Descargar cloudflared oficial
        id: cloudflared
        if: steps.local.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --output /tmp/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod 0755 /tmp/cloudflared
          /tmp/cloudflared --version

      - name: Abrir túnel público temporal
        id: tunnel
        if: steps.cloudflared.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          nohup /tmp/cloudflared tunnel --no-autoupdate --url http://127.0.0.1:3000 \
            >/tmp/teralya-cloudflared.log 2>&1 &
          tunnel_pid=$!
          echo "pid=$tunnel_pid" >> "$GITHUB_OUTPUT"

          public_url=""
          for _ in $(seq 1 120); do
            public_url="$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/teralya-cloudflared.log | tail -n 1 || true)"
            [[ -n "$public_url" ]] && break
            kill -0 "$tunnel_pid" 2>/dev/null || {
              cat /tmp/teralya-cloudflared.log >&2
              exit 1
            }
            sleep 2
          done

          if [[ -z "$public_url" ]]; then
            echo "Cloudflare no devolvió una URL temporal." >&2
            cat /tmp/teralya-cloudflared.log >&2
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --retry 30 --retry-delay 2 --retry-all-errors \
            "$public_url/" >/tmp/teralya-public-home.html
          grep -qi 'Teralya' /tmp/teralya-public-home.html

          echo "url=$public_url" >> "$GITHUB_OUTPUT"
          echo "Túnel preparado: $public_url"

      - name: Publicar el enlace verificable
        if: steps.tunnel.outcome == 'success'
        env:
          PUBLIC_URL: ${{ steps.tunnel.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          expires_at="$(date --utc --date='+5 hours 20 minutes' '+%Y-%m-%d %H:%M UTC')"
          body="$(cat <<EOF
          ## Demo temporal real de Teralya disponible

          - URL pública: ${PUBLIC_URL}
          - Frontend: aplicación Next.js construida desde \`main\`
          - Datos: API simulada del recorrido E2E, sin usuarios, pagos ni datos reales
          - Vigencia estimada: hasta **${expires_at}**
          - Commit: \`${GITHUB_SHA}\`

          Esta demo permite navegar la experiencia real del Frontend. No sustituye staging, producción ni OPS-01 y no debe usarse para compras.
          EOF
          )"
          payload="$(jq -nc --arg body "$body" '{body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/70/comments" >/dev/null

      - name: Registrar diagnóstico si la demo no se publica
        if: always() && steps.tunnel.outcome != 'success'
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          LOCAL_OUTCOME: ${{ steps.local.outcome }}
          CLOUDFLARED_OUTCOME: ${{ steps.cloudflared.outcome }}
          TUNNEL_OUTCOME: ${{ steps.tunnel.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$(
            {
              [[ -f /tmp/teralya-build.log ]] && { echo '=== build ==='; tail -n 60 /tmp/teralya-build.log; }
              [[ -f /tmp/teralya-frontend.log ]] && { echo '=== frontend ==='; tail -n 50 /tmp/teralya-frontend.log; }
              [[ -f /tmp/teralya-mock-api.log ]] && { echo '=== mock API ==='; tail -n 40 /tmp/teralya-mock-api.log; }
              [[ -f /tmp/teralya-cloudflared.log ]] && { echo '=== cloudflared ==='; tail -n 60 /tmp/teralya-cloudflared.log; }
            } | tail -n 140
          )"
          body="$(cat <<EOF
          ## Fallo al publicar la demo temporal

          - Build: **${BUILD_OUTCOME:-no ejecutado}**
          - Arranque local: **${LOCAL_OUTCOME:-no ejecutado}**
          - Instalación de cloudflared: **${CLOUDFLARED_OUTCOME:-no ejecutada}**
          - Túnel: **${TUNNEL_OUTCOME:-no ejecutado}**
          - Commit: \`${GITHUB_SHA}\`

          <details><summary>Diagnóstico técnico</summary>

          \`\`\`text
          ${diagnostic}
          \`\`\`
          </details>
          EOF
          )"
          payload="$(jq -nc --arg body "$body" '{body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/70/comments" >/dev/null

      - name: Exigir que el túnel esté disponible
        if: always() && steps.tunnel.outcome != 'success'
        shell: bash
        run: exit 1

      - name: Mantener la demo activa
        if: steps.tunnel.outcome == 'success'
        env:
          PUBLIC_URL: ${{ steps.tunnel.outputs.url }}
          TUNNEL_PID: ${{ steps.tunnel.outputs.pid }}
          FRONTEND_PID: ${{ steps.local.outputs.frontend_pid }}
          MOCK_PID: ${{ steps.local.outputs.mock_pid }}
        shell: bash
        run: |
          set -euo pipefail
          for minute in $(seq 1 320); do
            sleep 60
            for pid in "$TUNNEL_PID" "$FRONTEND_PID" "$MOCK_PID"; do
              kill -0 "$pid" 2>/dev/null || {
                echo "Un proceso de la demo se detuvo antes de tiempo." >&2
                tail -n 100 /tmp/teralya-cloudflared.log >&2 || true
                tail -n 100 /tmp/teralya-frontend.log >&2 || true
                tail -n 100 /tmp/teralya-mock-api.log >&2 || true
                exit 1
              }
            done
            if (( minute % 10 == 0 )); then
              curl --fail --silent --location --max-time 20 "$PUBLIC_URL/" >/dev/null
              echo "Demo saludable tras ${minute} minutos."
            fi
          done

      - name: Registrar finalización programada
        if: success()
        env:
          PUBLIC_URL: ${{ steps.tunnel.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          body="La demo temporal en ${PUBLIC_URL} ha finalizado según lo previsto. El código permanece en \`main\`; para una URL estable deben completarse las credenciales y los gates de OPS-01."
          payload="$(jq -nc --arg body "$body" '{body:$body}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/70/comments" >/dev/null
