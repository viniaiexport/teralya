name: Reanudar activación de staging una vez

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ops-resume-staging-once.yml"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: teralya-resume-staging-once
  cancel-in-progress: false

jobs:
  resume:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment: staging
    env:
      STAGING_DEPLOY_ENABLED: ${{ vars.STAGING_DEPLOY_ENABLED }}
      STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Comprobar credenciales operativas
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          require_value() {
            local name="$1"
            local value="$2"
            [[ -n "$value" ]] || missing+=("$name")
          }
          require_value "vars.STAGING_DEPLOY_ENABLED" "$STAGING_DEPLOY_ENABLED"
          require_value "secrets.STAGING_SSH_PRIVATE_KEY" "$STAGING_SSH_PRIVATE_KEY"
          require_value "secrets.STAGING_SSH_KNOWN_HOSTS" "$STAGING_SSH_KNOWN_HOSTS"
          require_value "secrets.STAGING_SSH_HOST" "$STAGING_SSH_HOST"
          require_value "secrets.STAGING_SSH_USER" "$STAGING_SSH_USER"
          require_value "secrets.STAGING_ENV_FILE" "$STAGING_ENV_FILE"
          [[ "$STAGING_DEPLOY_ENABLED" == "true" ]] || missing+=("vars.STAGING_DEPLOY_ENABLED=true")
          if [[ -n "$STAGING_ENV_FILE" ]]; then
            grep -qx 'ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0' <<<"$STAGING_ENV_FILE" || missing+=("ALCOHOL_TERMS_VERSION=LEGAL-06-v1.0 en STAGING_ENV_FILE")
            grep -Eq 'replace-with|REPLACE_WITH' <<<"$STAGING_ENV_FILE" && missing+=("STAGING_ENV_FILE sin marcadores replace-with")
          fi
          if (( ${#missing[@]} > 0 )); then
            reason="$(printf '%s; ' "${missing[@]}")"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=${reason%; }" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "reason=Configuración de staging presente" >> "$GITHUB_OUTPUT"

      - name: Lanzar workflow oficial de staging
        if: steps.preflight.outputs.ready == 'true'
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          workflow_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/staging.yml"
          runs_api="${workflow_api}/runs?event=workflow_dispatch&per_page=30"
          before_id="$(curl --fail --silent --show-error --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" "$runs_api" | jq -r '.workflow_runs[0].id // 0')"
          curl --fail --silent --show-error --request POST --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" --header "X-GitHub-Api-Version: 2022-11-28" --data '{"ref":"main"}' "${workflow_api}/dispatches"
          run_id=""
          for _ in $(seq 1 60); do
            run_id="$(curl --fail --silent --show-error --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" "$runs_api" | jq -r --argjson before "$before_id" '[.workflow_runs[] | select(.id != $before)] | sort_by(.created_at) | last | .id // empty')"
            [[ -n "$run_id" ]] && break
            sleep 5
          done
          [[ -n "$run_id" ]] || { echo "No apareció la ejecución de staging." >&2; exit 1; }
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"

      - name: Esperar staging y exigir despliegue real
        if: steps.preflight.outputs.ready == 'true'
        id: wait
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          run_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          for _ in $(seq 1 240); do
            run_json="$(curl --fail --silent --show-error --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" "$run_api")"
            status="$(jq -r '.status' <<<"$run_json")"
            conclusion="$(jq -r '.conclusion // empty' <<<"$run_json")"
            if [[ "$status" == "completed" ]]; then
              jobs_json="$(curl --fail --silent --show-error --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" "${run_api}/jobs?per_page=100")"
              deploy_conclusion="$(jq -r '[.jobs[] | select(.name == "Deploy to Hetzner")][0].conclusion // "missing"' <<<"$jobs_json")"
              echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
              echo "deploy_conclusion=$deploy_conclusion" >> "$GITHUB_OUTPUT"
              [[ "$conclusion" == "success" && "$deploy_conclusion" == "success" ]] || exit 1
              exit 0
            fi
            sleep 10
          done
          echo "Staging no terminó dentro de la ventana operativa." >&2
          exit 1

      - name: Verificar web pública de staging
        if: steps.wait.outputs.deploy_conclusion == 'success'
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location --retry 30 --retry-delay 10 --retry-all-errors https://staging.teralya.eu/ >/tmp/staging.html
          grep -qi 'Teralya' /tmp/staging.html
          echo "verified=true" >> "$GITHUB_OUTPUT"

      - name: Registrar resultado sin secretos
        if: always()
        env:
          READY: ${{ steps.preflight.outputs.ready }}
          REASON: ${{ steps.preflight.outputs.reason }}
          RUN_URL: ${{ steps.dispatch.outputs.run_url }}
          RUN_CONCLUSION: ${{ steps.wait.outputs.conclusion }}
          DEPLOY_CONCLUSION: ${{ steps.wait.outputs.deploy_conclusion }}
          VERIFIED: ${{ steps.verify.outputs.verified }}
        shell: bash
        run: |
          set -euo pipefail
          body="$(cat <<EOF
          ## Reanudación de OPS-01

          - Configuración disponible: **${READY:-false}**
          - Preflight: ${REASON:-no disponible}
          - Workflow oficial: ${RUN_CONCLUSION:-no iniciado}
          - Despliegue Hetzner: ${DEPLOY_CONCLUSION:-no iniciado}
          - Verificación pública: ${VERIFIED:-false}
          - Ejecución: ${RUN_URL:-no disponible}
          - Commit: \`${GITHUB_SHA}\`

          No se muestran valores secretos.
          EOF
          )"
          payload="$(jq -nc --arg body "$body" '{body:$body}')"
          curl --fail --silent --show-error --request POST --header "Authorization: Bearer ${GH_TOKEN}" --header "Accept: application/vnd.github+json" --header "X-GitHub-Api-Version: 2022-11-28" --data "$payload" "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/70/comments" >/dev/null
