name: Backend

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "docs/INF/openapi/**"
      - "docs/INF/teralya_schema_v1.4_APROBADO.sql"
      - "scripts/validate_openapi_contract.py"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "docs/INF/openapi/**"
      - "docs/INF/teralya_schema_v1.4_APROBADO.sql"
      - "scripts/validate_openapi_contract.py"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      PORT: 3999
      DATABASE_URL: postgresql://teralya:teralya_ci@localhost:5432/teralya
      REDIS_URL: redis://localhost:6379
      PUBLIC_BASE_URL: http://localhost:3001
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_0000000000
      MINIMUM_PURCHASE_AGE: 18
      ALCOHOL_TERMS_VERSION: ci-test-v1
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 5
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teralya
          POSTGRES_USER: teralya
          POSTGRES_PASSWORD: teralya_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teralya -d teralya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply approved PostgreSQL schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f docs/INF/teralya_schema_v1.4_APROBADO.sql
      - run: npm run backend:check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pyyaml
      - run: python scripts/validate_openapi_contract.py docs/INF/openapi/teralya-openapi-v1.0.yaml
      - run: npx --yes @redocly/cli lint docs/INF/openapi/teralya-openapi-v1.0.yaml
