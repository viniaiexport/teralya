          properties:
            object:
              type: object
              additionalProperties: true
              required:
              - id
              - payment_status
              - amount_total
              - currency
              - metadata
              properties:
                id:
                  type: string
                  minLength: 1
                  maxLength: 200
                payment_status:
                  type: string
                  enum:
                  - paid
                  - unpaid
                  - no_payment_required
                amount_total:
                  type: integer
                  minimum: 0
                currency:
                  type: string
                  const: eur
                metadata:
                  type: object
                  additionalProperties: false
                  properties:
                    pedido_id: *id001
                    pago_id: *id001
                  required:
                  - pedido_id
                  - pago_id
      required:
      - id
      - type
      - livemode
      - data
