openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Teralya API
  version: 1.0.0
  description: Contrato OpenAPI 3.1 del MVP. Derivado de INF-08 v2.5, INF-10 v1.0 e INF-10-A v1.0.
  contact:
    name: Teralya
    url: https://teralya.es
  license:
    name: Propietario — Teralya
    identifier: LicenseRef-Teralya-Proprietary
servers:
- url: https://api.teralya.es
  description: Producción
tags:
- name: Autenticación
  description: Registro, acceso y recuperación de credenciales.
- name: Bodegas
  description: Alta, perfil y consulta pública de bodegas.
- name: Vinos
  description: Catálogo y gestión del ciclo de vida del vino.
- name: Carrito
  description: Gestión y fusión idempotente del carrito de compra.
- name: Checkout
  description: Preparación del Pedido, pago y confirmación.
- name: Pedidos
  description: Consulta de Pedidos del comprador.
- name: SubPedidos
  description: Operativa logística propia de cada bodega.
- name: Administración
  description: Revisión, publicación, Pedidos e incidencias administrativas.
- name: Sistema
  description: Integraciones internas y webhooks firmados.
- name: Direcciones
  description: Gestión idempotente de direcciones propias.
- name: Imágenes
  description: Carga directa a S3 y gestión de imágenes de vino.
paths:
  /auth/registro/comprador:
    post:
      operationId: api001
      x-teralya-api-code: API-001
      x-teralya-cu:
      - CU-001
      x-teralya-pt:
      - PT-ACC-001
      tags:
      - Autenticación
      summary: Registrar comprador
      description: Contrato normativo de API-001.
      security: []
      responses:
        '201':
          description: Operación completada
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
              examples:
                success:
                  value:
                    access_token: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
                    token_type: Bearer
                    expires_in: 28800
                    expires_at: '2026-07-13T12:00:00Z'
                    usuario:
                      id: 11111111-1111-4111-8111-111111111111
                      email: usuario@example.com
                      rol: comprador
                      idioma: es
                      estado: pendiente_verificacion
        '400':
          description: Validation Error
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                error:
                  value:
                    type: https://teralya.es/problems/validation-error
                    title: Validation Error
                    status: 400
                    detail: La solicitud no pudo completarse.
                    code: VALIDATION_ERROR
                    request_id: 11111111-1111-4111-8111-111111111111
                    retryable: false
        '409':
          description: Conflict
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                error:
                  value:
                    type: https://teralya.es/problems/conflict
                    title: Conflict
                    status: 409
                    detail: La solicitud no pudo completarse.
                    code: CONFLICT
                    request_id: 11111111-1111-4111-8111-111111111111
                    retryable: false
        '500':
          description: Internal Error
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                error:
                  value:
                    type: https://teralya.es/problems/internal-error
                    title: Internal Error
                    status: 500
                    detail: La solicitud no pudo completarse.
                    code: INTERNAL_ERROR
                    request_id: 11111111-1111-4111-8111-111111111111
                    retryable: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBuyerRequest'
            examples:
              success:
                value:
                  email: usuario@example.com
                  password: aaaaaaaaaaaa
                  nombre: aaaaa
                  apellidos: aaaaa
                  fecha_nacimiento: '1990-01-01'
                  declaracion_mayoria_edad: true
                  aceptacion_condiciones_alcohol: true
