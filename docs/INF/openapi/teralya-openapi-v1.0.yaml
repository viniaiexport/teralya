      summary: Cambiar estado de SubPedido
      description: 'Matriz permitida: pendiente→aceptado|cancelado|incidencia; aceptado→en_preparacion|cancelado|incidencia;
        en_preparacion→enviado|cancelado|incidencia; incidencia→en_preparacion|cancelado; enviado→entregado. Entregado y cancelado
