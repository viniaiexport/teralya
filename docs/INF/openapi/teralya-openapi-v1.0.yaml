  /sistema/webhooks/stripe:
    post:
      operationId: api029
      x-teralya-api-code: API-029
      x-teralya-cu:
      - CU-028
      - CU-029
      x-teralya-pt: []
      tags:
      - Sistema
      summary: Procesar webhook Stripe
      description: 'Valida Stripe-Signature sobre el body crudo con tolerancia máxima de 300 segundos. Allowlist: checkout.session.completed,
        checkout.session.async_payment_succeeded, checkout.session.async_payment_failed y checkout.session.expired. event.id
        es la clave del ledger; livemode, Session ID, metadata pedido_id/pago_id, currency=eur e importe en céntimos deben
        coincidir. completed con payment_status=paid y async_payment_succeeded confirman atómicamente Pago/Pedido, conservan
        snapshots, congelan líneas/precios, aplican stock y crean un SubPedido por Pedido–Bodega; completed no pagado no tiene
        efecto comercial; async_payment_failed marca Pago fallido y expired lo marca cancelado, sin stock ni SubPedidos. Reenvíos
        devuelven el resultado persistido.'
      security: []
      responses:
        '200':
          description: Operación completada
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
              examples:
                success:
                  value:
                    event_id: aaaaa
                    status: processed
        '400':
          description: Validation Error
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/problem+json:
