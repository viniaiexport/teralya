        todos los no cancelados pendientes→pagado; ninguno enviado/entregado y alguno aceptado/en_preparacion/incidencia→en_preparacion;
        mezcla de enviado/entregado con estados previos→parcialmente_enviado; todos los no cancelados enviado/entregado y
